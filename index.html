  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --black: #000;
  --white: #fff;
  --nav-h: 60px;
}

html, body { height: 100%; }
body { font-family: var(--font); color: #fff; background: #000; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
img { display: block; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  z-index: 100;
  background: #000; border-bottom: 1px solid #222;
}
.nav-logo { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 400; }
.nav-links { display: flex; gap: 36px; }
.nav-links a { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
.nav-links a:hover { opacity: 0.6; }

.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
.hamburger span { display: block; width: 22px; height: 1.5px; background: #fff; transition: transform 0.3s ease, opacity 0.3s ease; }
.hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

.mobile-menu {
  display: none; position: fixed; inset: 0;
  background: #000; z-index: 99;
  flex-direction: column; align-items: center; justify-content: center; gap: 48px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a { font-size: 22px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 300; }

/* ── GRID WRAPPER ── */
.grid-wrapper {
  margin-top: var(--nav-h);
  height: calc(100vh - var(--nav-h));
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 40px;
}

/* ── PAGE TITLE ── */
.page-title {
  font-size: clamp(18px, 2.2vw, 28px); letter-spacing: 0.2em; text-transform: uppercase;
  font-weight: 300; color: #fff; text-align: center;
}

/* ── SERIES GRID ── */
.series-grid {
  --gap: 12px;
  --card: min(
    calc((100vw * 0.8 - var(--gap) * 2) / 3),
    calc((100vh - var(--nav-h) - 80px - var(--gap)) * 0.8 / 2)
  );
  display: grid;
  grid-template-columns: repeat(3, var(--card));
  gap: var(--gap);
}

.series-card {
  position: relative;
  overflow: hidden;
  background: #1a1a1a;
  width: var(--card);
  height: var(--card);
}

.series-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}

.series-card:hover img { transform: scale(1.04); }

.series-card-label {
  position: absolute; bottom: 12px; left: 12px;
  background: rgba(0,0,0,0.55);
  color: #fff;
  padding: 5px 10px;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 400;
  pointer-events: none;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  .hamburger { display: flex; }

  .grid-wrapper { height: auto; padding: 24px 10px 10px; gap: 40px; }
  .series-grid {
    --card: calc(100vw - 20px);
    grid-template-columns: 1fr;
  }
}

/* ── FOOTER ── */
footer {
  text-align: center; padding: 28px 40px;
  font-size: 10px; letter-spacing: 0.1em;
  color: #fff; opacity: 0.35;
}
  </style>
</head>

</div>

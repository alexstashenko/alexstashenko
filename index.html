<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Александр Сташенко — Фотограф</title>
  <meta name="description" content="Фотопортфолио Александра Сташенко">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --black: #000;
  --white: #fff;
  --nav-h: 60px;
}

html, body { height: 100%; }
body { font-family: var(--font); color: var(--black); background: var(--white); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
img { display: block; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  z-index: 100;
  background: var(--white); border-bottom: 1px solid #e8e8e8;
}
.nav-logo { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 400; }
.nav-links { display: flex; gap: 36px; }
.nav-links a { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
.nav-links a:hover { opacity: 0.6; }

.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
.hamburger span { display: block; width: 22px; height: 1.5px; background: var(--black); }

.mobile-menu {
  display: none; position: fixed; inset: 0;
  background: var(--white); z-index: 99;
  flex-direction: column; align-items: center; justify-content: center; gap: 48px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a { font-size: 22px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 300; }

/* ── SERIES GRID ── */
.series-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  height: calc(100vh - var(--nav-h));
  margin-top: var(--nav-h);
}

.series-card {
  position: relative;
  overflow: hidden;
  background: #1a1a1a;
}

.series-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}

.series-card:hover img { transform: scale(1.04); }

.series-card-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 20px 20px 18px;
  background: linear-gradient(transparent, rgba(0,0,0,0.55));
  color: #fff;
}

.series-card-name {
  display: block;
  font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 400; line-height: 1.4;
}

.series-card-type {
  display: block;
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  opacity: 0.65; margin-top: 2px;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  .hamburger { display: flex; }

  .series-grid {
    grid-template-columns: 1fr;
    grid-template-rows: none;
    height: auto;
  }

  .series-card { height: 56vw; }
}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Александр Сташенко</a>
  <div class="nav-links">
    <a href="series.html">Серии</a>
    <a href="about.html">Об авторе</a>
    <a href="contact.html">Контакт</a>
  </div>
  <button class="hamburger" aria-label="Меню">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu">
  <a href="series.html">Серии</a>
  <a href="about.html">Об авторе</a>
  <a href="contact.html">Контакт</a>
</div>

<div class="series-grid">

  <a class="series-card" href="series.html#color">
    <img src="images/hero-1.jpg" alt="Сквозь стекло (цвет)">
    <div class="series-card-label">
      <span class="series-card-name">Сквозь стекло</span>
      <span class="series-card-type">цвет</span>
    </div>
  </a>

  <a class="series-card" href="series.html#bw">
    <img src="images/hero-2.jpg" alt="Сквозь стекло (ч/б)">
    <div class="series-card-label">
      <span class="series-card-name">Сквозь стекло</span>
      <span class="series-card-type">ч/б</span>
    </div>
  </a>

  <a class="series-card" href="series.html#paris">
    <img src="images/hero-3.jpg" alt="Ночной Париж">
    <div class="series-card-label">
      <span class="series-card-name">Ночной Париж</span>
      <span class="series-card-type">цвет</span>
    </div>
  </a>

  <a class="series-card" href="series.html#sena">
    <img src="images/hero-4.jpg" alt="Сена">
    <div class="series-card-label">
      <span class="series-card-name">Сена</span>
      <span class="series-card-type">ч/б</span>
    </div>
  </a>

  <a class="series-card" href="series.html#india">
    <img src="images/hero-5.jpg" alt="Индия">
    <div class="series-card-label">
      <span class="series-card-name">Индия</span>
      <span class="series-card-type">цвет</span>
    </div>
  </a>

  <a class="series-card" href="series.html#fotobana">
    <img src="images/hero-6.jpg" alt="Фотобана">
    <div class="series-card-label">
      <span class="series-card-name">Фотобана</span>
      <span class="series-card-type">ч/б</span>
    </div>
  </a>

</div>

<script src="js/main.js"></script>
</body>
</html>

      <div class="series-content">
        <div class="grid grid-natural gallery-group">

          <div class="photo-item"><img src="images/through-glass-bw/h-02.jpg" alt="Сквозь стекло ч/б h-02"></div>

          <div class="photo-item"><img src="images/through-glass-bw/h-10.jpg" alt="Сквозь стекло ч/б h-10"></div>
          <div class="photo-item"><img src="images/through-glass-bw/s-01.jpg" alt="Сквозь стекло ч/б s-01"></div>
          <div class="photo-item"><img src="images/through-glass-bw/s-02.jpg" alt="Сквозь стекло ч/б s-02"></div>
          <div class="photo-item"><img src="images/through-glass-bw/s-03.jpg" alt="Сквозь стекло ч/б s-03"></div>
          <div class="photo-item"><img src="images/through-glass-bw/s-04.jpg" alt="Сквозь стекло ч/б s-04"></div>

      <div class="series-content">

        <p class="coming-soon">Фотографии появятся позже</p>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
  <button class="lb-btn lb-close" aria-label="Закрыть">&#x2715;</button>
  <button class="lb-btn lb-prev" aria-label="Предыдущая">&#x2190;</button>
  <img class="lb-img" src="" alt="">
  <button class="lb-btn lb-next" aria-label="Следующая">&#x2192;</button>
  <div class="lb-counter"></div>
</div>

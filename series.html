<body>

<nav class="solid">
  <a class="nav-logo" href="index.html">А. Сташенко</a>
  <div class="nav-links">
    <a href="series.html" class="active">Серии</a>

<div class="mobile-menu">

<div class="page">
  <header class="series-header">
    <span class="section-label">Серии</span>
  </header>

  <div class="series-list">

    <!-- ── Through Glass (ч/б) ── -->
    <div class="series-item open">
      <div class="series-toggle">
        <div class="series-toggle-info">
          <h2>Through Glass <span style="font-style:italic; opacity:.55">(ч/б)</span></h2>
          <span class="series-meta">19 фотографий</span>
        </div>
        <div class="toggle-icon"></div>
      </div>

      <div class="series-content">

        <!-- Горизонтальные -->
        <div class="subgroup">
          <p class="section-label subgroup-label">Горизонтальные</p>
          <div class="grid grid-h gallery-group">
            <div class="photo-item"><img src="images/through-glass-bw/h-01.jpg" alt="Through Glass ч/б — горизонтальная 1"></div>
            <div class="photo-item"><img src="images/through-glass-bw/h-02.jpg" alt="Through Glass ч/б — горизонтальная 2"></div>
            <div class="photo-item"><img src="images/through-glass-bw/h-03.jpg" alt="Through Glass ч/б — горизонтальная 3"></div>
            <div class="photo-item"><img src="images/through-glass-bw/h-04.jpg" alt="Through Glass ч/б — горизонтальная 4"></div>
            <div class="photo-item"><img src="images/through-glass-bw/h-05.jpg" alt="Through Glass ч/б — горизонтальная 5"></div>
            <div class="photo-item"><img src="images/through-glass-bw/h-06.jpg" alt="Through Glass ч/б — горизонтальная 6"></div>
            <div class="photo-item"><img src="images/through-glass-bw/h-07.jpg" alt="Through Glass ч/б — горизонтальная 7"></div>
            <div class="photo-item"><img src="images/through-glass-bw/h-08.jpg" alt="Through Glass ч/б — горизонтальная 8"></div>
            <div class="photo-item"><img src="images/through-glass-bw/h-09.jpg" alt="Through Glass ч/б — горизонтальная 9"></div>
            <div class="photo-item"><img src="images/through-glass-bw/h-10.jpg" alt="Through Glass ч/б — горизонтальная 10"></div>
          </div>
        </div>

        <!-- Вертикальные -->
        <div class="subgroup">
          <p class="section-label subgroup-label">Вертикальные</p>
          <div class="grid grid-v gallery-group">
            <div class="photo-item"><img src="images/through-glass-bw/v-01.jpg" alt="Through Glass ч/б — вертикальная 1"></div>
            <div class="photo-item"><img src="images/through-glass-bw/v-02.jpg" alt="Through Glass ч/б — вертикальная 2"></div>
            <div class="photo-item"><img src="images/through-glass-bw/v-03.jpg" alt="Through Glass ч/б — вертикальная 3"></div>
            <div class="photo-item"><img src="images/through-glass-bw/v-04.jpg" alt="Through Glass ч/б — вертикальная 4"></div>
            <div class="photo-item"><img src="images/through-glass-bw/v-05.jpg" alt="Through Glass ч/б — вертикальная 5"></div>
          </div>
        </div>

        <!-- Квадраты -->
        <div class="subgroup">
          <p class="section-label subgroup-label">Квадраты</p>
          <div class="grid grid-s gallery-group">
            <div class="photo-item"><img src="images/through-glass-bw/s-01.jpg" alt="Through Glass ч/б — квадрат 1"></div>
            <div class="photo-item"><img src="images/through-glass-bw/s-02.jpg" alt="Through Glass ч/б — квадрат 2"></div>
            <div class="photo-item"><img src="images/through-glass-bw/s-03.jpg" alt="Through Glass ч/б — квадрат 3"></div>
            <div class="photo-item"><img src="images/through-glass-bw/s-04.jpg" alt="Through Glass ч/б — квадрат 4"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ── Through Glass (цвет) ── -->
    <div class="series-item">
      <div class="series-toggle">
        <div class="series-toggle-info">
          <h2>Through Glass <span style="font-style:italic; opacity:.55">(цвет)</span></h2>
          <span class="series-meta">Скоро</span>
        </div>
        <div class="toggle-icon"></div>
      </div>
      <div class="series-content">
        <p class="coming-soon">Фотографии появятся позже</p>
      </div>
    </div>

    <!-- ── Ночной Париж ── -->
    <div class="series-item">
      <div class="series-toggle">
        <div class="series-toggle-info">
          <h2>Ночной Париж</h2>
          <span class="series-meta">Скоро</span>
        </div>
        <div class="toggle-icon"></div>
      </div>
      <div class="series-content">
        <p class="coming-soon">Фотографии появятся позже</p>
      </div>
    </div>

    <!-- ── Индия ── -->
    <div class="series-item">
      <div class="series-toggle">
        <div class="series-toggle-info">
          <h2>Индия</h2>
          <span class="series-meta">Скоро</span>
        </div>
        <div class="toggle-icon"></div>
      </div>
      <div class="series-content">
        <p class="coming-soon">Фотографии появятся позже</p>
      </div>
    </div>

  </div>
</div>

  <img class="lb-img" src="" alt="">
  <button class="lb-btn lb-next" aria-label="Следующая">&#x2192;</button>
  <div class="lb-counter"></div>
</div>

<script src="js/main.js"></script>

</html>

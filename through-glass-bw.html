<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сквозь стекло (ч/б) — Александр Сташенко</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; background: #000; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

a { color: inherit; text-decoration: none; }

/* ── TOP BAR ── */
.bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  z-index: 10;
}

.bar-title {
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
}

.bar-close {
  font-size: 22px; line-height: 1;
  opacity: 1; transition: opacity 0.2s; cursor: pointer;
  background: none; border: none; color: #fff; padding: 4px;
}
.bar-close:hover { opacity: 0.6; }
@media (max-width: 768px) {
  .bar-close { font-size: 12px; }
}

/* ── PHOTO VIEWER ── */
.viewer {
  position: fixed;
  inset: 56px 0 48px;
  display: flex; align-items: center; justify-content: center;
}

.viewer img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  user-select: none;
  transition: opacity 0.25s ease;
}

/* ── NAV ARROWS ── */
.nav-btn {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: #fff;
  cursor: pointer; opacity: 0.25; transition: opacity 0.2s;
  padding: 20px 28px; font-size: 20px; line-height: 1;
}
.nav-btn:hover { opacity: 0.8; }
.nav-prev { left: 0; }
.nav-next { right: 0; }

/* ── MOBILE SCROLL ── */
.scroll-container { display: none; }

@media (max-width: 768px) {
  .viewer, .nav-btn { display: none; }
  .scroll-container {
    display: block;
    position: fixed;
    inset: 56px 0 48px;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-item {
    height: 100%;
    scroll-snap-align: start;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .scroll-item img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; user-select: none;
  }
}

/* ── BOTTOM ── */
.bottom {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 48px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

.dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: #fff; opacity: 0.35;
  cursor: pointer; transition: opacity 0.2s;
  flex-shrink: 0;
}
.dot.active { opacity: 1; }

.counter {
  font-size: 11px; letter-spacing: 0.1em;
  margin-left: 14px;
}
  </style>
</head>
<body>

<div class="bar">
  <span class="bar-title">Сквозь стекло (ч/б)</span>
  <button class="bar-close" onclick="location.href='index.html'" aria-label="Закрыть">&#x2715;</button>
</div>

<div class="viewer">
  <img id="photo" src="" alt="">
</div>

<button class="nav-btn nav-prev" id="prev">&#8592;</button>
<button class="nav-btn nav-next" id="next">&#8594;</button>

<div class="scroll-container" id="scrollContainer"></div>

<div class="bottom">
  <div id="dots" style="display:flex;gap:10px;align-items:center;"></div>
  <span class="counter" id="counter"></span>
</div>

<script>
const photos = [
  'images/through-glass-bw/s-05.jpg',
  'images/through-glass-bw/s-01.jpg',
  'images/through-glass-bw/s-02.jpg',
  'images/through-glass-bw/s-03.jpg',
  'images/through-glass-bw/s-06.jpg',
  'images/through-glass-bw/v-01.jpg',
  'images/through-glass-bw/v-02.jpg',
  'images/through-glass-bw/v-04.jpg',
  'images/through-glass-bw/v-05.jpg',
  'images/through-glass-bw/h-01.jpg',
  'images/through-glass-bw/h-02.jpg',
  'images/through-glass-bw/h-03.jpg',
  'images/through-glass-bw/h-04.jpg',
  'images/through-glass-bw/h-05.jpg',
  'images/through-glass-bw/h-06.jpg',
  'images/through-glass-bw/h-07.jpg',
  'images/through-glass-bw/h-08.jpg',
  'images/through-glass-bw/h-09.jpg',
  'images/through-glass-bw/h-10.jpg',
];

let current = 0;
const photoEl = document.getElementById('photo');
const counterEl = document.getElementById('counter');
const dotsEl = document.getElementById('dots');
const scrollContainer = document.getElementById('scrollContainer');

// Build dots
photos.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => show(i));
  dotsEl.appendChild(dot);
});

// Build mobile scroll items
photos.forEach(src => {
  const item = document.createElement('div');
  item.className = 'scroll-item';
  const img = document.createElement('img');
  img.src = src;
  item.appendChild(img);
  scrollContainer.appendChild(item);
});

// Track active photo while scrolling
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const idx = [...scrollContainer.children].indexOf(e.target);
      if (idx >= 0) updateUI(idx);
    }
  });
}, { root: scrollContainer, threshold: 0.5 });
[...scrollContainer.children].forEach(item => observer.observe(item));

function updateUI(idx) {
  current = idx;
  counterEl.textContent = (idx + 1) + ' / ' + photos.length;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

function show(i, animate) {
  const idx = (i + photos.length) % photos.length;
  updateUI(idx);
  if (animate === false) { photoEl.src = photos[idx]; return; }
  photoEl.style.opacity = 0;
  setTimeout(() => { photoEl.src = photos[idx]; photoEl.style.opacity = 1; }, 200);
}

show(0, false);

document.getElementById('prev').addEventListener('click', () => show(current - 1));
document.getElementById('next').addEventListener('click', () => show(current + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  show(current - 1);
  if (e.key === 'ArrowRight') show(current + 1);
  if (e.key === 'Escape') location.href = 'index.html';
});

// Horizontal swipe — desktop only
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  if (window.innerWidth <= 768) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) show(dx < 0 ? current + 1 : current - 1);
}, { passive: true });
</script>
</body>
</html>

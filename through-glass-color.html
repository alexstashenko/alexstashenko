<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сквозь стекло — Александр Сташенко</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; background: #000; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

a { color: inherit; text-decoration: none; }

/* ── TOP BAR ── */
.bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  z-index: 10;
}

.bar-title {
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  opacity: 0.45;
}

.bar-close {
  font-size: 22px; line-height: 1;
  opacity: 0.4; transition: opacity 0.2s; cursor: pointer;
  background: none; border: none; color: #fff; padding: 4px;
}
@media (max-width: 768px) {
  .bar-close { font-size: 11px; }
}
.bar-close:hover { opacity: 1; }

/* ── PHOTO VIEWER ── */
.viewer {
  position: fixed;
  inset: 56px 0 48px;
  display: flex; align-items: center; justify-content: center;
}

.viewer img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  user-select: none;
  transition: opacity 0.25s ease;
}

/* ── NAV ARROWS ── */
.nav-btn {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: #fff;
  cursor: pointer; opacity: 0.25; transition: opacity 0.2s;
  padding: 20px 28px; font-size: 20px; line-height: 1;
}
.nav-btn:hover { opacity: 0.8; }
.nav-prev { left: 0; }
.nav-next { right: 0; }

/* ── DOTS ── */
.bottom {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 48px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

.dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: #fff; opacity: 0.2;
  cursor: pointer; transition: opacity 0.2s;
  flex-shrink: 0;
}
.dot.active { opacity: 0.7; }

.counter {
  font-size: 11px; letter-spacing: 0.1em; opacity: 0.35;
  margin-left: 14px;
}
  </style>
</head>
<body>

<div class="bar">
  <span class="bar-title">Сквозь стекло (цвет)</span>
  <button class="bar-close" onclick="location.href='index.html'" aria-label="Закрыть">&#x2715;</button>
</div>

<div class="viewer">
  <img id="photo" src="" alt="">
</div>

<button class="nav-btn nav-prev" id="prev">&#8592;</button>
<button class="nav-btn nav-next" id="next">&#8594;</button>

<div class="bottom">
  <div id="dots" style="display:flex;gap:10px;align-items:center;"></div>
  <span class="counter" id="counter"></span>
</div>

<script>
const photos = [
  'images/through-glass-color/s-01.jpg',
  'images/through-glass-color/s-02.jpg',
  'images/through-glass-color/s-03.jpg',
  'images/through-glass-color/s-04.jpg',
  'images/through-glass-color/s-05.jpg',
  'images/through-glass-color/s-06.jpg',
];

let current = 0;
const photoEl = document.getElementById('photo');
const counterEl = document.getElementById('counter');
const dotsEl = document.getElementById('dots');

photos.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => show(i));
  dotsEl.appendChild(dot);
});

function show(i, animate) {
  current = (i + photos.length) % photos.length;
  counterEl.textContent = (current + 1) + ' / ' + photos.length;
  document.querySelectorAll('.dot').forEach((d, idx) => {
    d.classList.toggle('active', idx === current);
  });
  if (animate === false) {
    photoEl.src = photos[current];
    return;
  }
  photoEl.style.opacity = 0;
  setTimeout(() => {
    photoEl.src = photos[current];
    photoEl.style.opacity = 1;
  }, 200);
}

show(0, false);

document.getElementById('prev').addEventListener('click', () => show(current - 1));
document.getElementById('next').addEventListener('click', () => show(current + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  show(current - 1);
  if (e.key === 'ArrowRight') show(current + 1);
  if (e.key === 'Escape') location.href = 'index.html';
});

let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) show(dx < 0 ? current + 1 : current - 1);
}, { passive: true });
</script>
</body>
</html>
